<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Work Master Local Pro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="work_style.css?v=20260722-2">
</head>
<body>

<div id="app-container">
    <div id="loadingLayer"><div class="spinner"></div><span id="loadingText">처리 중...</span></div>

    <div class="header w95-out" id="mainHeader">
        <div class="toolbar-group">
            <button type="button" class="w95-btn icon-btn" onclick="window.openSearch()" title="통합검색"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button type="button" class="w95-btn icon-btn" onclick="window.openTrash()" title="휴지통"><i class="fa-solid fa-trash-can"></i></button>
        </div>
        <div class="toolbar-group header-right-tools">
            <button type="button" class="w95-btn icon-btn" onclick="window.triggerImport()" title="백업 복원"><i class="fa-solid fa-file-import" style="color:#dc2626;"></i></button>
            <button type="button" class="w95-btn icon-btn" onclick="if(window.WorkExportUI) window.WorkExportUI.open(); else alert('내보내기 모듈이 로드되지 않았습니다.');" title="엑셀 내보내기"><i class="fa-solid fa-file-excel" style="color:#10b981;"></i></button>
        </div>
    </div>
    
    <input type="file" id="importFile" hidden accept=".json,.txt,application/json,text/plain" onchange="window.importData(event)">
    
    <div class="month-grid" id="mainGrid"></div>
    
    <div style="padding: 0 10px; display:flex; gap: 6px; align-items: stretch; flex-shrink: 0; margin-bottom: 8px;">
        <button type="button" class="w95-btn icon-btn" id="quickMicBtn" onclick="window.toggleMicFor(event, 'quickInput', 'quickMicBtn')" title="음성 인식"><i class="fa-solid fa-microphone"></i></button>
        <input type="text" id="quickInput" class="m-input w95-in" style="flex:1; margin:0; min-width:0;" placeholder="주소 / 전화번호 등 빠른 입력" autocomplete="nope" spellcheck="false" data-lpignore="true">
        <button type="button" class="w95-btn" onclick="window.openQuickWorkModal()" style="font-weight:bold; color:var(--w-blue);">빠른 입력</button>
    </div>

    <div class="yearly-summary w95-out" id="yearlySummary"></div>

    <div id="fabToday" class="today-robot-fab" title="오늘 날짜로 이동 · 길게 누르면 강제 동기화" role="button" aria-label="오늘 날짜로 이동">
        <div class="today-robot" aria-hidden="true">
            <div class="robot-antenna"><span></span></div>
            <div class="robot-head">
                <span class="robot-eye robot-eye-left"></span>
                <span class="robot-eye robot-eye-right"></span>
                <span class="robot-mouth"></span>
            </div>
            <div class="robot-body"><span>오늘</span></div>
            <span class="robot-arm robot-arm-left"></span>
            <span class="robot-arm robot-arm-right"></span>
            <span class="robot-foot robot-foot-left"></span>
            <span class="robot-foot robot-foot-right"></span>
        </div>
        <div class="robot-speech" aria-hidden="true"></div>
        <div class="robot-pet" aria-hidden="true">
            <span class="pet-ear pet-ear-left"></span><span class="pet-ear pet-ear-right"></span>
            <span class="pet-eye"></span><span class="pet-nose"></span><span class="pet-tail"></span>
        </div>
        <div class="robot-ball" aria-hidden="true"></div>
    </div>

    <div id="popupLayer" class="layer">
        <div class="pop-nav w95-out">
            <div style="display:flex; align-items:center;">
                <button type="button" class="w95-btn icon-btn" onclick="if(!window.isSyncLongPress) window.closePop()" onmousedown="window.startSyncPress(event)" onmouseup="window.endSyncPress(event)" onmouseleave="window.cancelSyncPress()" ontouchstart="window.startSyncPress(event)" ontouchend="window.endSyncPress(event)" ontouchcancel="window.cancelSyncPress()" oncontextmenu="return false;" style="margin-right: 8px; touch-action: manipulation; user-select: none;" title="길게 누르면 강제 동기화"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="pop-title" id="monthLabel" onclick="window.closePop()">0월</div>
            </div>
            <div class="pop-nav-stats">
                <span class="pop-month-summary">
                    <span>완료/작업 <b id="popCompletedWork">0</b>/<b id="popSumWork">0</b></span>
                    <span id="popCommuteOt" class="pop-commute-ot">출퇴근 초과 0시 0분</span>
                </span>
                <button type="button" class="w95-btn icon-btn" onclick="window.openSearch()" style="margin-left: 8px;"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
        <div id="popContentArea">
            <table class="cal-table"><tbody id="calBody"></tbody></table>
            <div id="logList" class="list-area"></div>
        </div>
        <div class="footer-nav w95-out">
            <div id="previewArea" style="display:flex; gap:6px; margin-bottom:4px; overflow-x:auto;"></div>
            <div class="single-input-row">
                <button type="button" class="w95-btn icon-btn" id="micBtn" onclick="window.toggleMicFor(event, 'memoIn', 'micBtn')"><i class="fa-solid fa-microphone"></i></button>
                <button type="button" class="w95-btn icon-btn" onclick="document.getElementById('fileIn').click()"><i class="fa-solid fa-image"></i></button>
                <button type="button" class="w95-btn icon-btn" onclick="document.getElementById('fileCam').click()"><i class="fa-solid fa-camera"></i></button>
                <input type="file" id="fileIn" hidden multiple accept="image/*, .heic, .HEIC" onchange="window.handleGeneralFiles(this)">
                <input type="file" id="fileCam" hidden accept="image/*" capture="environment" onchange="window.handleGeneralFiles(this)">
                
                <input type="text" id="memoIn" class="m-input w95-in" style="flex:1; min-width:0; margin:0;" placeholder="메모 입력..." autocomplete="off" spellcheck="false" data-lpignore="true">
                <button type="button" class="w95-btn icon-btn" onclick="window.saveGeneralEntry()"><i class="fa-solid fa-paper-plane" style="color:var(--w-blue)"></i></button>
            </div>
            
            <div style="display:flex; margin-top: 4px; gap:6px; align-items: stretch; height: 38px;">
                <button type="button" class="w95-btn" onclick="window.openCommuteModal('in')" style="flex:1;" title="출근"><i class="fa-solid fa-sign-in-alt" style="color:var(--w-blue); font-size:1.4rem;"></i></button>
                <button type="button" class="w95-btn" onclick="window.openWorkModal()" style="flex:2;" title="작업 일지 작성"><i class="fa-solid fa-clipboard-list" style="color:var(--w-blue); font-size:1.4rem;"></i></button>
                <button type="button" class="w95-btn" onclick="window.openCommuteModal('out')" style="flex:1;" title="퇴근"><i class="fa-solid fa-sign-out-alt" style="color:#ef4444; font-size:1.4rem;"></i></button>
            </div>
        </div>
    </div>

    <div id="workModal" class="modal-overlay">
        <div class="modal-box w95-window">
            <div id="workModalTitlebar" class="w95-titlebar">
                <button type="button" id="workLayoutHideBtn" class="w95-btn work-layout-hide-btn"
                    title="켜 둔 동안 선택태그상자를 탭해서 작업일지에서 숨김/복원"
                    onclick="window.toggleHideGroupMode()">숨기기</button>
                <div class="work-layout-title-actions">
                    <button type="button" id="workRememberModeBtn" class="w95-btn work-layout-remember-btn"
                        title="켜고 그룹을 탭하면 그 그룹만 기억 on/off 토글(다시 탭하면 해제)" onclick="window.toggleRememberSelectMode()">기억</button>
                    <button type="button" id="workLayoutOrderBtn" class="w95-btn work-layout-order-btn"
                        title="켜면 그룹 단위로만 선택·이동 가능" onclick="window.toggleOrderMode()">순서</button>
                    <button type="button" id="workLayoutGroupBtn" class="w95-btn work-layout-group-btn"
                        title="그룹 추가" onclick="window.groupSelectedBlocks()">그룹+</button>
                    <button type="button" id="workLayoutUngroupBtn" class="w95-btn work-layout-ungroup-btn"
                        title="켜 둔 동안 커스텀 선택태그상자를 탭해서 삭제" onclick="window.toggleDeleteGroupMode()">삭제</button>
                    <button type="button" id="workLayoutResetBtn" class="w95-btn work-layout-reset-btn"
                        title="기본 배치 복원" onclick="window.resetWorkLayout()">초기화</button>
                    <button type="button" id="workLayoutModeBtn" class="w95-btn" style="padding:0 6px;"
                        title="1.2초 이상 누르면 레이아웃 변경 모드"
                        onpointerdown="window.startWorkLayoutPress(event)"
                        onpointerup="window.endWorkLayoutPress(event)"
                        onpointermove="window.moveWorkLayoutPress(event)"
                        onpointercancel="window.cancelWorkLayoutPress()">X</button>
                </div>
            </div>
            
            <div class="modal-content-scroll" style="padding:4px; display:flex; flex-direction:column;">
                <div id="workDragContainer">

                    <div class="drag-item w95-out" data-id="1" style="display:flex; flex-direction:column; gap:2px; padding:2px;">
                        <div id="boxTitle_basicFields" class="box-title" title="길게 눌러 이름 변경"
                            onmousedown="window.startTitlePress(event, 'basicFields')" onmouseup="window.endTitlePress('basicFields')" onmouseleave="window.cancelTitlePress()"
                            ontouchstart="window.startTitlePress(event, 'basicFields')" ontouchend="window.endTitlePress('basicFields')" ontouchcancel="window.cancelTitlePress()"
                            >기본그룹</div>
                        <!-- 날짜 -->
                        <div class="work-obj-wrap" data-obj-id="date" data-obj-label="날짜" style="display:flex; align-items:center; position:relative;">
                            <div style="position:relative; flex:1; display:flex; align-items:center; justify-content:center; background:#fff; border: 2px solid; border-color: #808080 #fff #fff #808080; height:28px; min-width:80px;">
                                <span id="workDayLabel" style="font-weight:bold; font-size:0.8rem; color:var(--w-blue); pointer-events:none;"></span>
                                <input type="date" id="workDateInput" style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;" onchange="window.updateWorkDateLabel()">
                            </div>
                        </div>
                        <!-- 시간 -->
                        <div class="work-obj-wrap" data-obj-id="time" data-obj-label="시간">
                            <input type="text" id="workTime" inputmode="numeric" class="m-input w95-in" style="width:100%; text-align:center; height:28px;" placeholder="시간" onblur="window.formatTimeInput(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">
                        </div>
                        <!-- 당직 -->
                        <div class="work-obj-wrap" data-obj-id="duty" data-obj-label="당직">
                            <button type="button" id="workDutyBtn" class="w95-btn" style="width:100%; height:28px;" onclick="window.toggleDuty()">당직</button>
                        </div>
                        <!-- OT: 당직처럼 탭하면 켜짐/꺼짐(작업일지 1개당 1개), 숫자는 이번달 OT 건수 -->
                        <div class="work-obj-wrap" data-obj-id="ot" data-obj-label="OT">
                            <button type="button" id="workOTBtn" class="w95-btn" style="width:100%; height:28px;" title="OT on/off (이번달 OT 건수 표시)" onclick="window.toggleOT()">0</button>
                        </div>
                        <!-- 되돌리기 -->
                        <div class="work-obj-wrap" data-obj-id="undo" data-obj-label="되돌리기">
                            <button type="button" id="workUndoBtn" class="w95-btn work-undo-btn" style="width:100%;" title="방금 작업 취소" onclick="window.undoWorkDraft()">↶</button>
                        </div>
                        <!-- Task번호 -->
                        <div class="work-obj-wrap" data-obj-id="taskNo" data-obj-label="Task번호">
                            <input type="text" id="taskNo" inputmode="numeric" class="m-input w95-in" style="width:100%; height:28px;" placeholder="Task 번호">
                        </div>
                        <!-- 복사 -->
                        <div class="work-obj-wrap" data-obj-id="copy" data-obj-label="복사">
                            <button type="button" id="workCopyBtn" class="w95-btn icon-btn" style="width:100%; height:28px;" title="작업일지 내용 복사" onclick="window.copyWorkDraft()"><i class="fa-solid fa-copy"></i></button>
                        </div>
                        <!-- 고객명 -->
                        <div class="work-obj-wrap" data-obj-id="customer" data-obj-label="고객명">
                            <input type="text" id="customerName" class="m-input w95-in" style="width:100%; height:28px;" placeholder="고객명">
                        </div>
                        <!-- 주소 -->
                        <div class="work-obj-wrap" data-obj-id="address" data-obj-label="주소">
                            <input type="text" id="workAddress" class="m-input w95-in" style="width:100%; height:28px;" placeholder="주소 입력">
                        </div>
                        <!-- 지도 -->
                        <div class="work-obj-wrap" data-obj-id="map" data-obj-label="지도">
                            <button type="button" class="w95-btn icon-btn" style="width:100%; height:28px;" onmousedown="window.startMapPress(event)" onmouseup="window.endMapPress(event)" ontouchstart="window.startMapPress(event)" ontouchend="window.endMapPress(event)"><i class="fa-solid fa-map-location-dot"></i></button>
                        </div>
                        <!-- 작업내용: 날짜/Task와 같은 블록에 고정되어 항상 붙어서 표시됨 -->
                        <div class="work-obj-wrap" data-obj-id="content" data-obj-label="작업내용">
                            <textarea id="workContent" class="m-input w95-in" rows="1" style="width:100%; height:28px; padding-top:4px; resize:none;" placeholder="작업 내용"></textarea>
                        </div>
                        <!-- 특이사항 -->
                        <div class="work-obj-wrap" data-obj-id="note" data-obj-label="특이사항">
                            <input type="text" id="workNote" class="m-input w95-in" style="width:100%; height:28px;" placeholder="특이사항">
                        </div>
                    </div>

                    <div class="drag-item w95-in" data-id="8" data-group-ref="duration">
                        <div id="boxTitle_duration" class="box-title" title="길게 눌러 이름 변경"
                            onmousedown="window.startTitlePress(event, 'duration')" onmouseup="window.endTitlePress('duration')" onmouseleave="window.cancelTitlePress()"
                            ontouchstart="window.startTitlePress(event, 'duration')" ontouchend="window.endTitlePress('duration')" ontouchcancel="window.cancelTitlePress()"
                            >시작/종료</div>
                        <div class="btn-tag-area" style="justify-content:center;">
                            <button type="button" id="workStartBtn" class="w95-btn" style="flex:1; min-width:70px;" title="짧게 탭: 찍기/취소 토글 · 길게 누르면 시간 수정"
                                onmousedown="window.startDurationPress(event,'start')" onmouseup="window.endDurationPress(event,'start')" onmouseleave="window.cancelDurationPress()"
                                ontouchstart="window.startDurationPress(event,'start')" ontouchend="window.endDurationPress(event,'start')" ontouchcancel="window.cancelDurationPress()"
                                >시작</button>
                            <button type="button" id="workEndBtn" class="w95-btn" style="flex:1; min-width:70px;" title="짧게 탭: 찍기/취소 토글 · 길게 누르면 시간 수정"
                                onmousedown="window.startDurationPress(event,'end')" onmouseup="window.endDurationPress(event,'end')" onmouseleave="window.cancelDurationPress()"
                                ontouchstart="window.startDurationPress(event,'end')" ontouchend="window.endDurationPress(event,'end')" ontouchcancel="window.cancelDurationPress()"
                                >종료</button>
                            <div id="workTotalTimeLabel" style="flex:1; min-width:80px; text-align:center; font-weight:bold; color:var(--w-blue); font-size:0.85rem;">--:--</div>
                        </div>
                        <div class="drag-handle"><i class="fa-solid fa-circle" style="font-size:5px;"></i></div>
                    </div>

                    <div class="drag-item w95-in" data-id="3" data-group-ref="taskTypes">
                        <div id="boxTitle_taskTypes" class="box-title" onmousedown="window.startTitlePress(event, 'taskTypes')" onmouseup="window.endTitlePress('taskTypes')" onmouseleave="window.cancelTitlePress()" ontouchstart="window.startTitlePress(event, 'taskTypes')" ontouchend="window.endTitlePress('taskTypes')" ontouchcancel="window.cancelTitlePress()">작업 유형</div>
                        <div id="taskTypeArea" class="btn-tag-area"></div>
                        <div class="drag-handle"><i class="fa-solid fa-circle" style="font-size:5px;"></i></div>
                    </div>

                    <div class="drag-item w95-in" data-id="4" data-group-ref="coworkers">
                        <div id="boxTitle_coworkers" class="box-title" onmousedown="window.startTitlePress(event, 'coworkers')" onmouseup="window.endTitlePress('coworkers')" onmouseleave="window.cancelTitlePress()" ontouchstart="window.startTitlePress(event, 'coworkers')" ontouchend="window.endTitlePress('coworkers')" ontouchcancel="window.cancelTitlePress()">매니저</div>
                        <div id="coworkerArea" class="btn-tag-area"></div>
                        <div class="drag-handle"><i class="fa-solid fa-circle" style="font-size:5px;"></i></div>
                    </div>

                    <div class="drag-item w95-in" data-id="5" data-group-ref="equipments">
                        <div id="boxTitle_equipments" class="box-title" onmousedown="window.startTitlePress(event, 'equipments')" onmouseup="window.endTitlePress('equipments')" onmouseleave="window.cancelTitlePress()" ontouchstart="window.startTitlePress(event, 'equipments')" ontouchend="window.endTitlePress('equipments')" ontouchcancel="window.cancelTitlePress()">사용 장비</div>
                        <div id="equipArea" class="btn-tag-area"></div>
                        <div class="drag-handle"><i class="fa-solid fa-circle" style="font-size:5px;"></i></div>
                    </div>

                    <div class="drag-item w95-in" data-id="6" data-group-ref="statuses">
                        <div id="boxTitle_statuses" class="box-title" onmousedown="window.startTitlePress(event, 'statuses')" onmouseup="window.endTitlePress('statuses')" onmouseleave="window.cancelTitlePress()" ontouchstart="window.startTitlePress(event, 'statuses')" ontouchend="window.endTitlePress('statuses')" ontouchcancel="window.cancelTitlePress()">상태</div>
                        <div id="statusArea" class="btn-tag-area"></div>
                        <div class="drag-handle"><i class="fa-solid fa-circle" style="font-size:5px;"></i></div>
                    </div>

                    <div class="drag-item w95-in" data-id="7" style="padding:2px;">
                        <!-- 사진 그리드 -->
                        <div class="work-obj-wrap" data-obj-id="photoGrid" data-obj-label="사진">
                            <div id="workPhotoGrid" class="photo-edit-grid" style="display:flex; gap:4px; overflow-x:auto; min-height:32px; width:100%;"></div>
                        </div>
                        <!-- 앨범 -->
                        <div class="work-obj-wrap" data-obj-id="photoAlbum" data-obj-label="앨범">
                            <button type="button" class="w95-btn icon-btn" style="width:100%; height:28px;" onclick="document.getElementById('workPhotoInput').click()"><i class="fa-solid fa-image"></i></button>
                        </div>
                        <!-- 카메라 -->
                        <div class="work-obj-wrap" data-obj-id="photoCamera" data-obj-label="카메라">
                            <button type="button" class="w95-btn icon-btn" style="width:100%; height:28px;" onclick="document.getElementById('workCamInput').click()"><i class="fa-solid fa-camera"></i></button>
                        </div>
                        <input type="file" id="workPhotoInput" hidden multiple accept="image/*, .heic" onchange="window.handleWorkFiles(this)">
                        <input type="file" id="workCamInput" hidden accept="image/*" capture="environment" onchange="window.handleWorkFiles(this)">
                    </div>

                </div>
            </div>
            <div class="modal-footer" style="padding:4px; background:var(--w-gray); display:flex; gap:4px;">
                <button type="button" id="workEditSaveBtn" class="w95-btn" style="display:none; flex:1; height:32px; font-weight:bold; color:#7c3aed;" onclick="window.unlockWorkEdit()">수정</button>
                <button type="button" id="workSaveBtn" class="w95-btn" style="flex:1; height:32px; font-weight:bold; color:var(--w-blue);" onclick="window.saveWorkLog()">저장</button>
                <button type="button" class="w95-btn" style="flex:1; height:32px; font-weight:bold; color:red;" onclick="window.closeWorkModal()">취소</button>
            </div>
        </div>
    </div>

    <div id="commuteModal" class="modal-overlay" style="z-index: 2500;">
        <div class="modal-box w95-window">
            <div class="w95-titlebar">
                <span id="commuteTitle">출/퇴근 기록</span>
                <button type="button" class="w95-btn" style="padding:0 6px;" onclick="window.closeCommuteModal()">X</button>
            </div>
            <div class="modal-content-scroll" style="padding:8px; display:flex; flex-direction:column; gap:6px;">
                
                <div style="display:flex; gap:8px; align-items: stretch;">
                    <div id="commuteThumbZone" style="width: 85px; height: auto; min-height: 105px; border:2px solid var(--w-dark-gray); background:var(--w-white); position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; cursor:pointer;" onclick="window.handleCommuteThumbClick(event)">
                        <span id="commuteNoPhotoText" style="font-size:0.75rem; color:#888; text-align:center; pointer-events:none;">사진 없음</span>
                        <img id="commuteImgPreview" style="display:none; width:100%; height:100%; object-fit:cover; pointer-events:none;">
                        <button type="button" id="commuteImgDelBtn" class="w95-btn" style="display:none; position:absolute; top:0; right:0; width:22px; height:22px; padding:0; font-size:10px; color:red; z-index:10;" onclick="window.removeCommuteImg(event)">X</button>
                    </div>
                    <input type="file" id="commuteImgInput" hidden accept="image/*, .heic" onchange="window.handleCommuteImg(this)">
                    
                    <div style="flex:1; display:flex; flex-direction:column; justify-content:space-between; gap:6px;">
                        <div style="display:flex; gap:4px; align-items:center;">
                            <input type="text" id="commuteTime" inputmode="numeric" class="m-input w95-in" style="flex:1;" placeholder="시간" onblur="window.formatTimeInput(this); if(window.updateOvertime) window.updateOvertime();" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">
                            <input type="number" id="commuteKm" inputmode="numeric" class="m-input w95-in" style="flex:1;" placeholder="거리(km)">
                        </div>
                        <div style="display:flex; gap:4px; align-items:center;">
